<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حساب المطلوب دفعه</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2027">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg1:#0f2027;
--bg2:#203a43;
--bg3:#2c5364;
--card:rgba(255,255,255,0.08);
--text:#ffffff;
--accent:#00c6ff;
}

.light{
--bg1:#f1f5f9;
--bg2:#e2e8f0;
--bg3:#cbd5e1;
--card:rgba(255,255,255,0.7);
--text:#111827;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:var(--text);
transition:0.4s;
padding:20px;
}

.container{
width:100%;
max-width:420px;
padding:40px 30px;
border-radius:28px;
backdrop-filter:blur(30px);
background:var(--card);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 25px 60px rgba(0,0,0,0.45);
display:flex;
flex-direction:column;
gap:18px;
animation:fadeUp 0.8s ease;
}

h1{
text-align:center;
font-size:24px;
font-weight:800;
margin-bottom:10px;
}

.input-group{
display:flex;
flex-direction:column;
gap:6px;
}

label{
font-size:13px;
opacity:0.8;
}

input{
padding:14px;
border-radius:14px;
border:none;
font-size:15px;
text-align:center;
outline:none;
background:rgba(255,255,255,0.15);
color:var(--text);
}

button{
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
font-size:15px;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,114,255,0.4);
}

.result{
margin-top:5px;
font-size:20px;
font-weight:700;
text-align:center;
color:#00ffcc;
min-height:30px;
}

.history{
margin-top:10px;
font-size:13px;
display:flex;
flex-direction:column;
gap:6px;
max-height:120px;
overflow:auto;
opacity:0.85;
}

.history div{
background:rgba(255,255,255,0.08);
padding:8px;
border-radius:10px;
}

.toggle{
position:absolute;
top:20px;
left:20px;
cursor:pointer;
font-size:14px;
}

footer{
margin-top:25px;
font-size:14px;
text-align:center;
opacity:0.9;
}

footer a{
color:var(--accent);
text-decoration:none;
font-weight:600;
}

canvas{
margin-top:10px;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleMode()">🌙 / ☀️</div>

<div class="container">

<h1>حساب المطلوب دفعه</h1>

<div class="input-group">
<label>المبلغ اللي عايزه يوصل</label>
<input type="number" id="amount">
</div>

<div class="input-group">
<label>نسبة الخصم %</label>
<input type="number" id="percent" value="1.8">
</div>

<button onclick="calculate()">احسب المطلوب دفعه</button>

<div class="result" id="result"></div>

<canvas id="chart"></canvas>

<div class="history" id="history"></div>

</div>

<footer>
created by 
<a href="https://fathimohamed.vercel.app" target="_blank">
fathi Mohamed
</a>
</footer>

<script>
let chart;

function calculate(){
let amount=parseFloat(document.getElementById("amount").value);
let percent=parseFloat(document.getElementById("percent").value)/100;

if(isNaN(amount)||isNaN(percent)||percent>=1) return;

let total=amount/(1-percent);
let fee=total-amount;

document.getElementById("result").innerText=
"المطلوب دفعه: "+total.toFixed(2);

saveHistory(amount,total);
drawChart(amount,fee);
}

function drawChart(amount,fee){
let ctx=document.getElementById('chart').getContext('2d');
if(chart) chart.destroy();

chart=new Chart(ctx,{
type:'doughnut',
data:{
labels:['المبلغ الصافي','الخصم'],
datasets:[{data:[amount,fee]}]
},
options:{
plugins:{legend:{display:true}}
}
});
}

function saveHistory(amount,total){
let history=JSON.parse(localStorage.getItem("history"))||[];
history.unshift("يوصل "+amount+" → تدفع "+total.toFixed(2));
if(history.length>6) history.pop();
localStorage.setItem("history",JSON.stringify(history));
renderHistory();
}

function renderHistory(){
let history=JSON.parse(localStorage.getItem("history"))||[];
document.getElementById("history").innerHTML=
history.map(h=>"<div>"+h+"</div>").join("");
}

function toggleMode(){
document.body.classList.toggle("light");
}

renderHistory();

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
